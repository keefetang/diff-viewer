<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Split-view motif: two overlapping document shapes with diff colors -->
  <!-- Left doc (deletions side) -->
  <rect x="3" y="4" width="15" height="24" rx="2" fill="#f4f6f8" stroke="#1a1d21" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="6" y1="10" x2="15" y2="10" stroke="#f52b00" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="6" y1="14" x2="13" y2="14" stroke="#f52b00" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="6" y1="18" x2="14" y2="18" stroke="#1a1d21" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.15"/>
  <!-- Right doc (additions side) -->
  <rect x="14" y="4" width="15" height="24" rx="2" fill="#f4f6f8" stroke="#1a1d21" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="17" y1="10" x2="26" y2="10" stroke="#00c69d" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="17" y1="14" x2="24" y2="14" stroke="#00c69d" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="17" y1="18" x2="25" y2="18" stroke="#1a1d21" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.15"/>
  <!-- Center divider — the split -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
</svg>
